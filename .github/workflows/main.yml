name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: write

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: 3.14.0

    - name: Install Dependencies
      run: pip install -r requirements.txt

    - name: Lint check
      run: pylint app.py tests/test_app.py --disable=all --enable=E

    - name: Run Tests
      run: pytest
    
    - name: SonarCloud Scan
      env:
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      run: |
        # Download and unzip SonarScanner
        curl -sSLo sonar-scanner-cli.zip https://github.com/SonarSource/sonar-scanner-cli/releases/download/4.6.2.2472/sonar-scanner-cli-4.6.2.2472-linux.zip
        unzip sonar-scanner-cli.zip
        ./sonar-scanner-4.6.2.2472-linux/bin/sonar-scanner \
          -Dsonar.projectKey=your_project_key \
          -Dsonar.organization=your_organization_key \
          -Dsonar.host.url=https://sonarcloud.io \
          -Dsonar.login=${{ secrets.SONAR_TOKEN }}


  release:
    needs: ci
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code (full history)
      uses: actions/checkout@v3
      with:
        fetch-depth: 0  

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: 3.14.0

    - name: Install Dependencies
      run: pip install -r requirements.txt

    - name: Run Semantic Release
      env:
        GITHUB_TOKEN: ${{ secrets.TOKEN }}
      run: semantic-release version

    - name: Get Version
      run: echo "VERSION=$(semantic-release version --print)" >> $GITHUB_ENV


    - name: Login to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build Docker Image
      run: |
        docker build -t ${{ secrets.DOCKER_USERNAME }}/fitness-app:v${{ env.VERSION }} \
                     -t ${{ secrets.DOCKER_USERNAME }}/fitness-app:latest .

    - name: Push Docker Image
      run: |
        docker push ${{ secrets.DOCKER_USERNAME }}/fitness-app:v${{ env.VERSION }}
        docker push ${{ secrets.DOCKER_USERNAME }}/fitness-app:latest